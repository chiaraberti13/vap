site_name: Vulnerability Assessment Platform
site_description: Documentazione ufficiale VAP (API, manuale utente, deployment, sicurezza)
site_url: https://example.com/vap
repo_url: https://example.com/vap
repo_name: VAP
edit_uri: ""

theme:
  name: material
  language: it
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - API:
      - OpenAPI & Swagger: openapi.md
      - API Client Examples: api-clients.md
  - Manuale Utente: user-manual.md
  - Architettura: architecture.md
  - Configurazione: configuration.md
  - Threat Intelligence Feeds: threat-intelligence-feeds.md
  - Deployment: deployment.md
  - Security: security.md
  - WCAG AA Audit (2026-04): wcag-aa-audit-2026-04.md
  - Scanner Plugin Contract: scanner-plugin-contract.md
  - Dependency Update Policy: dependency-update-policy.md
  - Privacy & GDPR: privacy.md
  - Termini di Servizio: terms.md
  - SOC 2 Controls: soc2-controls.md
  - Incident Response: incident-response.md
  - Vulnerability Disclosure: vulnerability-disclosure.md
  - Troubleshooting: troubleshooting.md
  - Contributing: contributing.md
  - Video Tutorials: video-tutorials.md
  - Percorsi Formativi:
      - Panoramica: learning-paths/README.md
      - Beginner Path: learning-paths/beginner-path.md
      - Analyst Path: learning-paths/analyst-path.md
      - Professional Path: learning-paths/professional-path.md
  - Scan Playbooks:
      - Panoramica: scan-playbooks/README.md
  - Glossario & FAQ Operative: glossary-faq.md
  - Riferimenti Ufficiali: official-references.md
  - Release Candidate Checklist: release-candidate.md
  - Go-live Controllato: go-live-controlled.md

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
