version: "3.9"
services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      VAP_API_CACHE_ENABLED: "true"
      VAP_API_CACHE_REDIS_URL: "redis://redis:6379/0"
      VAP_REQUIRE_HTTPS: "false"
    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
