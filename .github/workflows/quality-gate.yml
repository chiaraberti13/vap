name: quality-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  security-and-style-guards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run security headers and subject-header lint tests
        env:
          PYTHONPATH: .
        run: |
          pytest --no-cov -q tests/test_security_headers.py tests/test_subject_header_lint.py

  api-integration-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API integration regression suite
        env:
          PYTHONPATH: .
        run: |
          pytest --no-cov -q tests/test_api_integration.py

