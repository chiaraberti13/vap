name: DAST Pre-Release (OWASP ZAP autenticato)

# Eseguito manualmente prima di ogni release o automaticamente sui tag v*.
# Richiede un ambiente staging raggiungibile (VAP_STAGING_URL) con
# credenziali di test (VAP_DAST_USERNAME / VAP_DAST_PASSWORD).
#
# Per abilitare l'autenticazione al login, configurare i secret in
# Settings → Secrets and variables → Actions:
#   VAP_STAGING_URL       — URL dell'ambiente staging (es. https://vap.staging.example.com)
#   VAP_DAST_USERNAME     — Username account test DAST
#   VAP_DAST_PASSWORD     — Password account test DAST
#   VAP_DAST_API_KEY      — API key applicazione (se abilitata)

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL staging da scansionare (override VAP_STAGING_URL)"
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: read
  security-events: write  # per upload SARIF

jobs:
  dast-zap:
    name: OWASP ZAP DAST (staging autenticato)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      TARGET_URL: ${{ inputs.target_url || secrets.VAP_STAGING_URL || 'http://127.0.0.1:8000' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build CSS (necessario per rendering corretto)
        run: |
          npm ci
          npm run build:css

      # Avvia app locale se non è configurato un target remoto
      - name: Start local VAP app (fallback staging locale)
        if: ${{ env.TARGET_URL == 'http://127.0.0.1:8000' }}
        env:
          VAP_ENV: development
          VAP_ENABLE_LIVE_SCANS: "false"
          VAP_HOST: "127.0.0.1"
          VAP_PORT: "8000"
          VAP_API_KEY: ${{ secrets.VAP_DAST_API_KEY || 'dast-test-key' }}
        run: |
          python app.py > /tmp/vap-dast.log 2>&1 &
          echo $! > /tmp/vap-app.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "L'app non è partita in tempo." >&2
          cat /tmp/vap-dast.log || true
          exit 1

      - name: Genera contesto autenticazione ZAP
        run: |
          mkdir -p /tmp/zap
          cat > /tmp/zap/auth-context.yaml << 'YAML'
          contexts:
            - name: "VAP Auth"
              urls:
                - "${TARGET_URL}"
              authentication:
                method: "form"
                parameters:
                  loginUrl: "${TARGET_URL}/auth/login"
                  loginRequestData: "username={%username%}&password={%password%}"
              users:
                - name: "dast-user"
                  credentials:
                    username: "${DAST_USERNAME}"
                    password: "${DAST_PASSWORD}"
          YAML
        env:
          TARGET_URL: ${{ env.TARGET_URL }}
          DAST_USERNAME: ${{ secrets.VAP_DAST_USERNAME || 'dast-user' }}
          DAST_PASSWORD: ${{ secrets.VAP_DAST_PASSWORD || 'dast-pass' }}

      - name: Run OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ env.TARGET_URL }}
          rules_file_name: ".zap/rules.tsv"
          cmd_options: >
            -z "-config api.disablekey=true"
            -T 50
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-full-scan-report

      - name: Run OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.7.0
        with:
          target: ${{ env.TARGET_URL }}/openapi.json
          format: openapi
          cmd_options: "-T 30"
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-api-scan-report

      - name: Upload ZAP SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: dast-zap

      - name: Stop local app
        if: always()
        run: |
          if [ -f /tmp/vap-app.pid ]; then
            kill "$(cat /tmp/vap-app.pid)" || true
          fi

  dast-gate:
    name: DAST Release Gate
    runs-on: ubuntu-latest
    needs: dast-zap
    if: always()

    steps:
      - name: Verifica esito DAST
        run: |
          if [ "${{ needs.dast-zap.result }}" != "success" ]; then
            echo "::error::DAST gate fallito — il job ZAP ha rilevato finding critici o è terminato con errore."
            echo "Consultare l'artefatto 'zap-full-scan-report' per i dettagli."
            exit 1
          fi
          echo "DAST gate superato — nessun finding critico rilevato."
