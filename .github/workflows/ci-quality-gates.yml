name: CI Quality Gates

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test Suite (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full pytest suite (blocking gate)
        run: |
          pytest --maxfail=1 --disable-warnings --junitxml=pytest-report.xml

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.xml

  lighthouse:
    name: Lighthouse CI (Performance/A11y/BP/SEO >= 90)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start app for Lighthouse
        env:
          VAP_ENV: development
          VAP_ENABLE_LIVE_SCANS: "false"
          VAP_HOST: "127.0.0.1"
          VAP_PORT: "8000"
        run: |
          python app.py > /tmp/vap-lighthouse.log 2>&1 &
          echo $! > /tmp/vap-app.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "L'app FastAPI non è partita in tempo." >&2
          cat /tmp/vap-lighthouse.log || true
          exit 1

      - name: Run Lighthouse CI assertions
        run: |
          npm install --no-save @lhci/cli@0.14.x
          npx lhci autorun --config=.lighthouserc.json

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/vap-app.pid ]; then
            kill "$(cat /tmp/vap-app.pid)" || true
          fi
