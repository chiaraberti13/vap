name: CI Quality Gates

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  css-build:
    name: CSS Build (Tailwind local pipeline)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Verify no CDN Tailwind references in templates
        run: |
          if grep -r "cdn\.tailwindcss\.com" templates/; then
            echo "ERROR: Trovata dipendenza CDN Tailwind nei template. Rimuovere e usare il build locale." >&2
            exit 1
          fi
          echo "OK: Nessuna dipendenza CDN Tailwind nei template."

      - name: Upload CSS artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailwind-css
          path: static/css/tailwind.min.css

  test:
    name: Test Suite (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: css-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full pytest suite (blocking gate)
        run: |
          pytest --maxfail=1 --disable-warnings --junitxml=pytest-report.xml

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.xml

  security:
    name: Security Gates (Bandit + Pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies and security tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Run Bandit (high severity gate)
        run: |
          bandit -r . \
            -x tests,.venv,venv,.git,__pycache__ \
            -f txt \
            -lll -ii

      - name: Run pip-audit (dependency vulnerability gate)
        run: |
          pip-audit --requirement requirements.txt

  visual-regression:
    name: Visual Regression (multi-breakpoint)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - css-build
      - test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies and build CSS
        run: |
          npm ci
          npm run build:css

      - name: Install Playwright
        run: |
          npm install --no-save @playwright/test
          npx playwright install --with-deps chromium

      - name: Start app for visual regression
        env:
          VAP_ENV: development
          VAP_ENABLE_LIVE_SCANS: "false"
          VAP_HOST: "127.0.0.1"
          VAP_PORT: "8000"
        run: |
          python app.py > /tmp/vap-vr.log 2>&1 &
          echo $! > /tmp/vap-app.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "L'app non è partita in tempo." >&2
          cat /tmp/vap-vr.log || true
          exit 1

      - name: Run visual regression tests (multi-breakpoint)
        run: npx playwright test tests/visual/

      - name: Upload visual regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: playwright-report/

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/vap-app.pid ]; then
            kill "$(cat /tmp/vap-app.pid)" || true
          fi

  lighthouse:
    name: Lighthouse CI (Performance/A11y/BP/SEO >= 90)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - test
      - security

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies and build CSS
        run: |
          npm ci
          npm run build:css

      - name: Start app for Lighthouse
        env:
          VAP_ENV: development
          VAP_ENABLE_LIVE_SCANS: "false"
          VAP_HOST: "127.0.0.1"
          VAP_PORT: "8000"
        run: |
          python app.py > /tmp/vap-lighthouse.log 2>&1 &
          echo $! > /tmp/vap-app.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "L'app FastAPI non è partita in tempo." >&2
          cat /tmp/vap-lighthouse.log || true
          exit 1

      - name: Run Lighthouse CI assertions
        run: |
          npm install --no-save @lhci/cli@0.14.x
          npx lhci autorun --config=.lighthouserc.json

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/vap-app.pid ]; then
            kill "$(cat /tmp/vap-app.pid)" || true
          fi
